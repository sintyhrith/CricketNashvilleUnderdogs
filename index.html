<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cricket Team Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🏏 Cricket Team Builder</h1>
  <p>T20 • Drag & Drop Field • Custom Pitch</p>
</header>

<div class="container">

  <!-- LEFT PANEL -->
  <section class="panel">
    <h2>Squad (25 Players)</h2>
    <select id="playerDropdown">
      <option value="">-- Select Player --</option>
    </select>
    <button onclick="addPlayer()">Add Player</button>
    <div id="selected" class="list"></div>
    <button onclick="exportImage()">Export Field as Image</button>
  </section>

  <!-- CENTER PANEL -->
  <section class="ground-panel">
    <h2>Cricket Field</h2>
    <div id="ground"></div>
  </section>

</div>

<footer>
  <span id="count">0 / 12 Selected</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="players.js"></script>
<script src="script.js"></script>
</body>
</html>
